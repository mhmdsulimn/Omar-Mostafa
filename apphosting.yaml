# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # تم رفع عدد المثيلات لضمان سرعة الاستجابة تحت الضغط
  minInstances: 0
  maxInstances: 5
  # تمديد وقت المهلة لضمان استقرار عمليات الذكاء الاصطناعي الطويلة
  timeoutSeconds: 300
  cpu: 1
  memoryMiB: 512